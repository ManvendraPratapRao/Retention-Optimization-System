services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: churn-base-image
    ports:
      - "8000:8000"
    volumes:
      - monitor_data:/app/data
    environment:
      - PORT=8000
      - MONITORING_DB_PATH=/app/data/monitoring.db
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  monitor_data: